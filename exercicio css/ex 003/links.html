<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
a {
    color: rgb(255, 0, 0);
    text-decoration: none;
    font-weight: bold;
}
a:visited {
    color: darkred;
}

a:hover {
    text-decoration: underline;
    color: black;
}
a:active {
    color: yellow;
}

a::after {
    content:  '[link]';
    text-decoration: none;
    font-weight: normal;
    color: darkgray;
}
    </style>
</head>
<body>
    <h1>personalizando links</h1>
<ul>
<li><a href="https://github.com/sophiazvcode" target="_blank">repositorio github</a></li>
<li><a href="https://www.youtube.com/@sophiazzv3768" target="_blank">canal do youtube</a></li>
<li><a href="https://www.sophiazvcode.com" target="_blank">site oficial</a></li>
</ul>
</body>
</html>
